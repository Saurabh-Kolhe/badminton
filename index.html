<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Badminton Tracker</title>

  <!-- jQuery (required by app.js for AJAX and DOM helpers) -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- App Styles -->
  <link rel="stylesheet" href="styles.css" />
</head>

<body>

  <div class="container">

    <h2>🏸 Badminton Stats</h2>

    <!-- Loading spinner (hidden once data loads) -->
    <div id="loader" class="loader"></div>

    <!-- Main content (revealed after data loads) -->
    <div id="app-content" style="display: none;">

      <!-- ── Stat Cards ──────────────────────────────────────── -->
      <div class="stats-grid">

        <div class="stat-card">
          <span class="stat-card__label">Total Hours</span>
          <strong id="total-hours" class="stat-card__value">0</strong>
        </div>

        <div class="stat-card">
          <span class="stat-card__label">Per Hour</span>
          <!-- Updated dynamically by app.js when date selection changes -->
          <strong id="per-hour-rate" class="stat-card__value">₹36</strong>
        </div>

        <div class="stat-card">
          <span class="stat-card__label">Surplus</span>
          <strong id="surplus-amount" class="stat-card__value">₹0</strong>
        </div>

      </div>

      <!-- ── Progress Bar ────────────────────────────────────── -->
      <div class="progress-container">
        <div class="progress-labels">
          <span>Collected: <strong>₹<span id="total-collected">0</span></strong></span>
          <span>Target: <strong>₹<span id="current-target">0</span></strong></span>
        </div>
        <div class="progress-bar-track">
          <div id="progress-bar-fill" class="progress-bar-fill"></div>
        </div>
      </div>

      <!-- ── Controls Panel ─────────────────────────────────── -->
      <div class="controls">

        <!-- Date picker + duration type selector (inline) -->
        <div class="input-row">

          <input
            type="date"
            id="session-date-input"
            aria-label="Session date"
          />

          <!-- Duration type toggle: 2hr / 1hr / Cancelled -->
          <div class="duration-toggle" role="group" aria-label="Session duration">
            <button class="duration-btn is-active" id="btn-2hr"
                    type="button" onclick="selectDurationType('2hr')">
              2hr ₹72
            </button>
            <button class="duration-btn" id="btn-1hr"
                    type="button" onclick="selectDurationType('1hr')">
              1hr ₹36
            </button>
            <button class="duration-btn duration-btn--cancel" id="btn-cancelled"
                    type="button" onclick="selectDurationType('cancelled')">
              ❌ -₹20
            </button>
          </div>

        </div>

        <!-- Add session button -->
        <button class="btn btn--primary" id="btn-add-session">Add Date</button>

        <!-- History toggle buttons -->
        <button class="btn btn--secondary" id="btn-view-history" disabled>
          View History
        </button>
        <button class="btn btn--tertiary" id="btn-view-old-history" disabled>
          View Old History
        </button>

        <!-- Current period session list (toggled by View History) -->
        <div id="current-history-list" class="history-list"></div>

        <!-- Previous period session list (toggled by View Old History) -->
        <div id="old-history-list" class="history-list"></div>

        <!-- Hardcoded note: previous target milestone -->
        <p class="info-note">
          ✨ Previous target of ₹1080 was met on 15-02-2026
        </p>

      </div>

      <!-- ── Target Met Banner (injected by app.js) ─────────── -->
      <div id="target-met-banner"></div>

      <!-- ── Debug Panel (POST request/response inspector) ───── -->
      <div id="debug-panel" class="debug-panel"></div>

    </div><!-- /#app-content -->

  </div><!-- /.container -->

  <!-- App Logic -->
  <script src="app.js"></script>

</body>
</html>
